<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Through the Biscuit Tin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a1a;
      --surface:   #222;
      --border:    #333;
      --text:      #d4cfc8;
      --muted:     #666;
      --green:     #4a7c59;
      --amber:     #b8860b;
      --red:       #8b2222;
      --greyed:    #444;
      --cursor:    #d4cfc8;
      --mono:      'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Stats panel ──────────────────────────────────── */
    #stats {
      width: 220px;
      min-width: 220px;
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      overflow-y: auto;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #stats .stat-block { border-top: 1px solid var(--border); padding-top: 10px; }
    #stats .stat-block:first-child { border-top: none; padding-top: 0; }

    #stats .label { color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; margin-bottom: 4px; }
    #stats .value { color: var(--text); }
    #stats .value.muted { color: var(--muted); }

    .rel-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .rel-name { flex: 1; }
    .dial { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dial.green  { background: var(--green); }
    .dial.amber  { background: var(--amber); }
    .dial.red    { background: var(--red); }
    .dial.greyed { background: var(--greyed); border: 1px solid #555; }

    .stat-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .stat-row .val { color: var(--muted); }
    .stat-row .val.active { color: var(--text); }

    #form-word { font-style: italic; color: var(--muted); }

    /* ── Main area ────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #narrative {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      max-width: 720px;
    }

    #narrative p { margin-bottom: 1em; }
    #narrative .turn-summary {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }
    #narrative .turn-summary .month { color: var(--text); letter-spacing: 0.1em; }

    /* ── Creation screen ─────────────────────────────── */
    #creation {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 32px;
      max-width: 520px;
    }

    #creation .dedication {
      color: var(--muted);
      font-style: italic;
      margin-bottom: 32px;
      font-size: 13px;
    }

    #creation .field-group { margin-bottom: 24px; }
    #creation .field-label { color: var(--muted); margin-bottom: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }

    #creation .dob-options { display: flex; flex-direction: column; gap: 8px; }
    #creation .dob-option {
      cursor: pointer;
      padding: 8px 10px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      background: none;
      text-align: left;
      transition: color 0.15s, border-color 0.15s;
    }
    #creation .dob-option:hover,
    #creation .dob-option.selected { color: var(--text); border-color: var(--text); }

    #creation input[type="text"] {
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      padding: 6px 0;
      width: 100%;
      outline: none;
    }
    #creation input[type="text"]:focus { border-bottom-color: var(--text); }

    /* ── Parser ──────────────────────────────────────── */
    #parser-area {
      border-top: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #parser-area .prompt-char { color: var(--muted); }

    #parser-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
    }

    .hidden { display: none !important; }

    #spinner { color: var(--muted); font-size: 12px; padding: 8px 32px; }
  </style>
</head>
<body>

<!-- ── Stats panel ─────────────────────────────────────────────────────────── -->
<div id="stats">
  <div class="stat-block">
    <div class="label" id="stats-name-label">—</div>
    <div class="value" id="stats-location">—</div>
  </div>

  <div class="stat-block">
    <div class="stat-row"><span class="label">Bank</span><span class="val" id="stats-bank">—</span></div>
    <div class="stat-row"><span class="label">Work</span><span class="val" id="stats-work">—</span></div>
    <div class="stat-row"><span class="label">Home</span><span class="val" id="stats-home">—</span></div>
  </div>

  <div class="stat-block" id="stats-people">
    <div class="label">People</div>
    <div id="stats-rels"></div>
  </div>

  <div class="stat-block">
    <div class="label">Cricket</div>
    <div class="stat-row"><span>Matches</span><span class="val" id="s-c-matches">—</span></div>
    <div class="stat-row"><span>Inns</span><span class="val" id="s-c-inns">—</span></div>
    <div class="stat-row"><span>Runs</span><span class="val" id="s-c-runs">—</span></div>
    <div class="stat-row"><span>Avg</span><span class="val" id="s-c-avg">—</span></div>
    <div class="stat-row"><span>HS</span><span class="val" id="s-c-hs">—</span></div>
    <div class="stat-row"><span>Wkts</span><span class="val" id="s-c-wkts">—</span></div>
  </div>

  <div class="stat-block">
    <div class="label">Football</div>
    <div class="stat-row"><span>Apps</span><span class="val" id="s-f-apps">—</span></div>
    <div class="stat-row"><span>Goals</span><span class="val" id="s-f-goals">—</span></div>
  </div>

  <div class="stat-block">
    <div class="label">Form</div>
    <div id="form-word">—</div>
  </div>
</div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Dedication screen -->
  <div id="dedication-screen" style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px 32px;">
    <div style="color:var(--muted);font-style:italic;font-size:13px;text-align:center;">
      For Ollie. Who plays centre-half.
    </div>
  </div>

  <!-- Character creation -->
  <div id="creation" class="hidden">
    <div class="field-group" id="field-dob">
      <div class="field-label">Your date of birth.</div>
      <div class="dob-options">
        <button class="dob-option" data-dob="1967">1967 — You were born the year England last won the Ashes before Botham.</button>
        <button class="dob-option" data-dob="1968">1968 — You were born the year of D'Oliveira. Selected. Dropped. Selected.</button>
        <button class="dob-option" data-dob="1969">1969 — You were born the year Yorkshire won the County Championship. Again.</button>
      </div>
    </div>

    <div class="field-group hidden" id="field-grandfather">
      <div class="field-label">Your grandfather's name.</div>
      <input type="text" id="input-grandfather" autocomplete="off" spellcheck="false">
    </div>

    <div class="field-group hidden" id="field-player">
      <div class="field-label">Your name.</div>
      <input type="text" id="input-player" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <!-- Narrative -->
  <div id="narrative" class="hidden"></div>
  <div id="spinner" class="hidden">...</div>

  <!-- Parser -->
  <div id="parser-area" class="hidden">
    <span class="prompt-char">&gt;</span>
    <input type="text" id="parser-input" autocomplete="off" spellcheck="false">
  </div>

</div>

<script>
(function () {
  'use strict';

  const WORKER_URL = 'https://cusslab-api.leanspirited.workers.dev';

  // ── State ──────────────────────────────────────────────────────────────────

  const state = {
    playerName:      '',
    grandfatherName: '',
    dob:             null,
    age:             null,
    bank:            4.30,
    work:            'Paper round',
    weeklyWage:      2.50,
    home:            "Nan's spare room",
    relationships:   { nan: 'green', mum: 'green', grandfather: 'greyed' },
    cricket:         { matches: 0, innings: 0, runs: 0, wkts: 0, avg: null, hs: null },
    football:        { apps: 0, goals: 0, level: null },
    form:            10,
    turnNumber:      1,
    gameState:       'DEDICATION', // DEDICATION | CREATION | OPENING | PLAY
    history:         [],
  };

  // ── DOM refs ───────────────────────────────────────────────────────────────

  const $ = id => document.getElementById(id);

  const elDedication   = $('dedication-screen');
  const elCreation     = $('creation');
  const elNarrative    = $('narrative');
  const elSpinner      = $('spinner');
  const elParserArea   = $('parser-area');
  const elParserInput  = $('parser-input');
  const elFieldGF      = $('field-grandfather');
  const elFieldPlayer  = $('field-player');
  const elInputGF      = $('input-grandfather');
  const elInputPlayer  = $('input-player');

  // ── Stats panel ────────────────────────────────────────────────────────────

  function renderStats() {
    $('stats-name-label').textContent =
      state.playerName ? `${state.playerName} — Age ${state.age} — November 1979` : '—';
    $('stats-location').textContent = '';
    $('stats-bank').textContent  = state.gameState === 'CREATION' ? '—' : `£${state.bank.toFixed(2)}`;
    $('stats-work').textContent  = state.gameState === 'CREATION' ? '—' : state.work;
    $('stats-home').textContent  = state.gameState === 'CREATION' ? '—' : state.home;
    $('form-word').textContent   = state.gameState === 'CREATION' ? '—' : getFormWord(state.form);

    const relsEl = $('stats-rels');
    relsEl.innerHTML = '';
    if (state.gameState !== 'CREATION') {
      for (const [name, dial] of Object.entries(state.relationships)) {
        if (name === 'grandfather') {
          relsEl.innerHTML += `<div class="rel-row"><span class="rel-name">${state.grandfatherName || 'Grandfather'}</span><span class="dial greyed"></span></div>`;
        } else {
          const dialClass = dial === 'green' ? 'green' : dial === 'amber' ? 'amber' : 'red';
          const label = name.charAt(0).toUpperCase() + name.slice(1);
          relsEl.innerHTML += `<div class="rel-row"><span class="rel-name">${label}</span><span class="dial ${dialClass}"></span></div>`;
        }
      }
    }

    // Cricket — dashes until stats exist
    const c = state.cricket;
    $('s-c-matches').textContent = c.matches || '—';
    $('s-c-inns').textContent    = c.innings  || '—';
    $('s-c-runs').textContent    = c.runs     || '—';
    $('s-c-avg').textContent     = c.avg      || '—';
    $('s-c-hs').textContent      = c.hs       || '—';
    $('s-c-wkts').textContent    = c.wkts     || '—';
    $('s-f-apps').textContent    = state.football.apps   || '—';
    $('s-f-goals').textContent   = state.football.goals  || '—';
  }

  // ── Narrative helpers ──────────────────────────────────────────────────────

  function appendNarrative(html) {
    elNarrative.insertAdjacentHTML('beforeend', html);
    elNarrative.scrollTop = elNarrative.scrollHeight;
  }

  function appendParagraph(text) {
    appendNarrative(`<p>${text}</p>`);
  }

  function appendTurnSummary(lines) {
    const months = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    const startMonth = 10; // NOVEMBER = index 10
    const totalMonths = startMonth + (state.turnNumber - 1);
    const month = months[totalMonths % 12];
    const year  = 1979 + Math.floor(totalMonths / 12);
    const nanDial  = state.relationships.nan;
    const dialWord = nanDial === 'green' ? 'still green' : nanDial === 'amber' ? 'cooling' : 'cold';
    const maslowLines = [
      `Nan:  ${dialWord}.`,
      `Form: ${state.form}.`,
      `Bank: £${state.bank.toFixed(2)}.`,
    ];
    const allLines = [...(lines || []), '', ...maslowLines];
    const body = allLines.map(l => `  ${l}`).join('<br>');
    appendNarrative(`
      <div class="turn-summary">
        <div class="month">─────────────────────────<br>${month} ${year}<br>─────────────────────────</div>
        <br>${body}
      </div>
    `);
  }

  // ── Dedication screen ──────────────────────────────────────────────────────

  document.addEventListener('keydown', function onDedicationKey(e) {
    if (state.gameState !== 'DEDICATION') return;
    if (['Shift','Control','Alt','Meta','Tab'].includes(e.key)) return;
    state.gameState = 'CREATION';
    elDedication.classList.add('hidden');
    elCreation.classList.remove('hidden');
    document.removeEventListener('keydown', onDedicationKey);
  });

  // ── Character creation ─────────────────────────────────────────────────────

  document.querySelectorAll('.dob-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dob-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.dob = parseInt(btn.dataset.dob, 10);
      state.age = 1979 - state.dob;
      elFieldGF.classList.remove('hidden');
      elInputGF.focus();
      renderStats();
    });
  });

  elInputGF.addEventListener('keydown', e => {
    if (e.key === 'Enter' && elInputGF.value.trim()) {
      state.grandfatherName = elInputGF.value.trim();
      elFieldPlayer.classList.remove('hidden');
      elInputPlayer.focus();
    }
  });

  elInputPlayer.addEventListener('keydown', e => {
    if (e.key === 'Enter' && elInputPlayer.value.trim()) {
      state.playerName = elInputPlayer.value.trim();
      renderStats();
      beginOpeningScene();
    }
  });

  // ── Opening scene ──────────────────────────────────────────────────────────

  function beginOpeningScene() {
    state.gameState = 'OPENING';
    elCreation.classList.add('hidden');
    elNarrative.classList.remove('hidden');
    renderStats();
    renderOpeningScene();
  }

  function renderOpeningScene() {
    const name = state.playerName;
    const gf   = state.grandfatherName;

    appendParagraph(`November 1979.`);
    appendParagraph(`${name}.`);
    appendParagraph(`Your nan's house smells the same as it always did.`);
    appendParagraph(`She has just handed you a biscuit tin — McVitie's shortbread, tartan, slightly dented on one corner — and gone back to the front room to watch Pebble Mill at One. That is what you do when something is too large to speak about directly.`);
    appendParagraph(`${gf} died last week. You are ${state.age} years old. You didn't know him at all. Now you have a tin.`);
    appendParagraph(`Inside:`);
    appendParagraph(`<em>A photograph.</em> Black and white, slightly foxed at the edges. Two rows of men in cricket whites in front of The Oval pavilion. ${gf} in the front row. Young. Something around his mouth that isn't quite a smile. On the back, in handwriting you don't recognise: <em>The Oval, August 1948.</em>`);
    appendParagraph(`<em>A Wisden page,</em> torn out carefully. A scorecard. His name second in the batting order. England v Australia. The Oval. August 1948. A score that means nothing to you yet.`);
    appendParagraph(`<em>A match stub.</em> Pale green card, soft with handling. Someone had this in a pocket for years. <em>THE OVAL. HOME v AUSTRALIA. AUGUST 1948.</em> No score written on it. Just the stub.`);
    appendParagraph(`<em>A coin.</em> Worn smooth. The wording gone entirely. Just a crest — something heraldic, half-legible. His thumb was there for years.`);
    appendParagraph(`<em>A Brylcreem advertisement</em> torn from a magazine. Him again — young, hair swept back, looking directly at the camera like he knows something.`);
    appendParagraph(`<em>A Southampton FC programme.</em> A league match at The Dell, 1947. His name in the lineup. Centre-half. Not a Cup Final. Just a Tuesday in November. He kept this one.`);
    appendParagraph(`<em>An Eagle comic.</em> April 1952. The Mekon on the cover, regarding Dan Dare from his flying saucer with cold contempt. Colours still bright because the tin kept the light out. You think the Mekon looks a bit naff, if you're honest.`);
    appendParagraph(`<em>A button</em> that doesn't match anything.`);
    appendParagraph(`Every biscuit tin in England has it. Nobody knows what it was from. Nobody will ever know.`);

    // Activate parser
    state.gameState = 'PLAY';
    elParserArea.classList.remove('hidden');
    elParserInput.focus();
  }

  // ── Parser ─────────────────────────────────────────────────────────────────

  elParserInput.addEventListener('keydown', async e => {
    if (e.key !== 'Enter') return;
    const input = elParserInput.value.trim();
    if (!input) return;
    elParserInput.value = '';
    elParserInput.disabled = true;

    appendParagraph(`<span style="color:var(--muted)">&gt; ${input}</span>`);

    const intent = classifyIntent(input);

    // ACTIVITY — resolve locally, no AI call
    const activity = classifyActivity(input);
    if (activity) {
      const delta = applyActivity(activity);
      commitDelta(delta);
      appendParagraph(delta.note);
      appendTurnSummary([delta.note]);
      state.turnNumber++;
      renderStats();
      elParserInput.disabled = false;
      elParserInput.focus();
      return;
    }

    // EXAMINE — pre-written response, no AI call
    if (intent === 'EXAMINE') {
      const prewritten = getExamineResponse(input);
      if (prewritten) {
        prewritten.split('\n\n').forEach(p => appendParagraph(p));
        elParserInput.disabled = false;
        elParserInput.focus();
        return;
      }
    }

    elSpinner.classList.remove('hidden');

    try {
      const response = await resolveWithAI(input, intent);
      elSpinner.classList.add('hidden');
      appendParagraph(response.narrative);
      if (response.summary) {
        appendTurnSummary(response.summary);
        state.turnNumber++;
      }
      renderStats();
    } catch (err) {
      elSpinner.classList.add('hidden');
      appendParagraph(`<span style="color:var(--muted)">[Something went wrong. Try again.]</span>`);
    }

    elParserInput.disabled = false;
    elParserInput.focus();
  });

  // ── Intent classifier ──────────────────────────────────────────────────────

  function classifyIntent(input) {
    const lower = input.toLowerCase().trim();
    if (/\b(examine|look at|inspect|read|pick up|open|check|what is|what'?s)\b/.test(lower)) return 'EXAMINE';
    if (/\b(go|get|head|walk|catch|take|yes|utley|club|bus|saturday|cricket|there)\b/.test(lower)) return 'GET_ON_BUS';
    if (/\b(stay|no|home|sit|don't|not today|later|tomorrow|nan|here)\b/.test(lower)) return 'STAY';
    return 'OTHER';
  }

  // ── FORM words ─────────────────────────────────────────────────────────────

  const FORM_BANDS = [
    { min: 0,  max: 4,  word: 'Lost' },
    { min: 5,  max: 8,  word: 'Nowhere' },
    { min: 9,  max: 12, word: 'Shaky' },
    { min: 13, max: 16, word: 'Decent' },
    { min: 17, max: 20, word: 'Flying' },
  ];

  function getFormWord(value) {
    const clamped = Math.max(0, Math.min(20, value));
    return (FORM_BANDS.find(b => clamped >= b.min && clamped <= b.max) || { word: 'Shaky' }).word;
  }

  // ── Activity engine ─────────────────────────────────────────────────────────

  function classifyActivity(input) {
    const lower = (input || '').toLowerCase().trim();
    if (/\b(nan|nan'?s|nans|visit nan|check on nan|go round|go to nan)\b/.test(lower)) return 'VISIT_NAN';
    if (/\b(nets|practice|batting|bowling|net session|training|cricket club)\b/.test(lower)) return 'NETS';
    if (/\b(work|paper round|shift|job|earn|money)\b/.test(lower)) return 'WORK';
    if (/\b(rest|sleep|early night|stay in|bed|tired)\b/.test(lower)) return 'REST';
    if (/\b(pub|pint|out with|lads|mates|drink|drinks)\b/.test(lower)) return 'PUB';
    if (/\b(study|homework|revision|revise|school|read|coursework)\b/.test(lower)) return 'STUDY';
    return null;
  }

  function applyActivity(activityType) {
    const delta = { formDelta: 0, bankDelta: 0, nanDialChange: null, note: '' };
    switch (activityType) {
      case 'VISIT_NAN':
        delta.nanDialChange = 'green';
        delta.note = "You went round to Nan's.";
        break;
      case 'NETS':
        delta.formDelta = state.form < 20 ? 1 : 0;
        delta.note = 'You went to nets.';
        break;
      case 'WORK':
        delta.bankDelta = state.weeklyWage;
        delta.note = `Paper round done. £${state.weeklyWage.toFixed(2)} earned.`;
        break;
      case 'REST':
        delta.formDelta = state.form < 17 ? 2 : 0;
        delta.note = 'You took the evening. Needed it.';
        break;
      case 'PUB':
        delta.formDelta = state.form > 10 ? 1 : -1;
        delta.note = 'You went to the pub.';
        break;
      case 'STUDY':
        delta.note = 'You did your homework.';
        break;
    }
    return delta;
  }

  function commitDelta(delta) {
    state.form = Math.max(0, Math.min(20, state.form + delta.formDelta));
    state.bank = Math.round((state.bank + delta.bankDelta) * 100) / 100;
    if (delta.nanDialChange) state.relationships.nan = delta.nanDialChange;
  }

  // ── EXAMINE — pre-written responses ────────────────────────────────────────

  const EXAMINE_PATTERNS = [
    { pattern: /\b(stub|match stub|match|oval|1948)\b/,                       id: 'match_stub' },
    { pattern: /\b(eagle|comic|mekon|dan dare|dan)\b/,                        id: 'eagle_comic' },
    { pattern: /\b(button)\b/,                                                id: 'button' },
    { pattern: /\b(coin|cup|crest|heraldic)\b/,                               id: 'coin' },
    { pattern: /\b(photo|photograph|picture|image)\b/,                        id: 'photograph' },
    { pattern: /\b(wisden|scorecard|score|batting order|cricket score)\b/,    id: 'wisden_page' },
    { pattern: /\b(programme|program|southampton|dell|football programme)\b/, id: 'southampton_programme' },
    { pattern: /\b(brylcreem|advert|advertisement|ad)\b/,                     id: 'brylcreem_ad' },
  ];

  const EXAMINE_RESPONSES = {
    match_stub:             `Pale green card. You hold it between two fingers and it gives — soft, the way paper goes when it's been in a pocket for years. Not kept. Carried.\n\nTHE OVAL. HOME v AUSTRALIA. AUGUST 1948. 2/6. On the reverse, a printed batting order. His name is on it. You don't recognise any of the others yet. No score written on it. No annotation.\n\nWhatever happened at The Oval in August 1948, your grandfather wanted to remember he was there.`,
    eagle_comic:            `April 1952. The Mekon on the cover — green-domed, sitting in his flying saucer, regarding Dan Dare with cold contempt. Like he's already won and is choosing not to announce it yet.\n\nThe colours are still bright. The tin kept the light out for thirty years.\n\nYou think the Mekon looks a bit naff, if you're honest. You keep looking at it anyway. Your grandfather kept this for thirty years and then put it in the tin. That's the part you can't quite explain.`,
    button:                 `White. Four holes. Doesn't match anything in this house.`,
    coin:                   `Heavier than you expect. Both sides worn smooth — not by age but by handling, by the specific pressure of a thumb. The wording is completely gone. What remains: a crest, something heraldic, an eagle or a lion or possibly both.\n\nYou can't tell if it's a semi-final or a final. You can't tell which year. You can't tell anything except that someone carried this for a very long time.`,
    photograph:             `Black and white, slightly foxed at the edges where the damp got in at some point. Two rows of men in cricket whites in front of The Oval pavilion. Your grandfather in the front row. Young — younger than you've ever thought of him as. Something around his mouth that isn't quite a smile. Like he knows something the camera doesn't.\n\nOn the back, in handwriting you don't recognise: The Oval, August 1948.`,
    wisden_page:            `Torn out carefully — whoever did this took their time. The page is slightly yellowed but the print is sharp. England v Australia, The Oval, August 1948. A scorecard. His name second in the batting order.\n\nThere's a score next to his name. You'll need to find out what it means.`,
    southampton_programme:  `A league match at The Dell, November 1947. Southampton versus someone — the cover is slightly water-damaged in the bottom corner, which is the south coast for you. His name in the printed lineup. Centre-half.\n\nNot a Cup Final. Not a famous match. Just a Tuesday in November, Southampton versus someone, The Dell, 1947. He kept this one. Not the glamorous one. This one.`,
    brylcreem_ad:           `Torn from a magazine. Him again — younger than the photograph, hair swept back, looking directly at the camera. Something about his expression: he's enjoying a private joke with someone just out of frame.\n\nThe Brylcreem logo in the corner. He was paid to look like that. He kept it anyway.`,
  };

  function getExamineResponse(input) {
    const lower = input.toLowerCase();
    for (const { pattern, id } of EXAMINE_PATTERNS) {
      if (pattern.test(lower)) return EXAMINE_RESPONSES[id] || null;
    }
    return null;
  }

  // ── AI resolution ──────────────────────────────────────────────────────────

  async function resolveWithAI(input, intent) {
    const systemPrompt = buildSystemPrompt();
    const userMsg      = buildUserMessage(input, intent);

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }],
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    return parseAIResponse(text, intent);
  }

  function buildSystemPrompt() {
    return `You are the narrator of Through the Biscuit Tin — a parser-style interactive life narrative. Working class Britain, November 1979.

WORLD:
The player is ${state.playerName}, age ${state.age}. Nan's house. ${state.grandfatherName} died last week. The biscuit tin contains: photograph (The Oval, August 1948), Wisden scorecard, match stub (THE OVAL AUGUST 1948 — soft with handling), worn coin (FA Cup — crest only, wording gone), Brylcreem ad, Southampton FC programme (The Dell, 1947), Eagle comic (April 1952, The Mekon), a button that matches nothing.

${state.grandfatherName}: cricket for England, football for Southampton FC. Never mentioned any of it. Ship's doctor in WWII. Wife died during the war. Came back to his daughter (Nan). Became just Dad. Then Grandpa.

INTERACTION MODEL — follow this exactly:
- Short by default. One beat. One consequence. Stop.
- Monologue only when the scene earns it: reliving a match, telling a story, going on a rant, the night before something important.
- DM voice. The player moves. The world responds. Do not over-narrate.
- Specific true detail over atmosphere. "Brown sauce, not ketchup." Not "the food was comforting."
- Never explain the feeling. Name the fact. The feeling follows.
- If nothing happens: the gas fire ticks. Something small. Never I DON'T UNDERSTAND THAT.

CULTURAL REGISTER — period-accurate working class Britain:
Milk float at 5am, electric hum, full cream on the step. Full English after a heavy night: proper sausages, black pudding, fried bread, brown sauce, tea in a mug, radio on a shelf. The corner shop. The phone box. Saturday morning Grandstand. The bookie's. The pavilion tea. The groundsman who knows more than the captain. The away dressing room with one cold tap. The pub (The Fleece, The Crown, The Shoulder of Mutton — pick one). The fruit machine. The darts board. Last orders bell. Ice cream van summer evenings. Semolina.

VOICE: Second person, present tense. Dry. Precise. Royle Family warmth for domestic scenes. Viz for grotesque truth. Squeeze for the specific detail. Never "unfortunately" or "sadly" or "well done."

Nan's dial stays green. Non-negotiable.

Respond ONLY in this JSON:
{
  "narrative": "1-3 paragraphs. Short. Specific. Stop when done.",
  "summary": ["one line", "one line", "one line"],
  "emit_summary": true
}

emit_summary: true when a meaningful choice moves time forward.`;
  }

  function buildUserMessage(input, intent) {
    const history = state.history.slice(-3).join('\n');
    return `Player input: "${input}"
Classified intent: ${intent}
Recent history: ${history || 'none'}

Resolve this input. If GET_ON_BUS: player heads to Utley Cricket Club. Write the journey and arrival. If STAY: player stays in the house. If EXAMINE: describe the object in precise, specific detail — what it feels like to hold, what it tells them. If OTHER: interpret generously.`;
  }

  function parseAIResponse(text, intent) {
    try {
      const json = JSON.parse(text);
      state.history.push(`Turn ${state.turnNumber}: ${intent}`);
      if (state.history.length > 5) state.history.shift();
      return {
        narrative: json.narrative || text,
        summary:   json.emit_summary ? json.summary : null,
      };
    } catch {
      return { narrative: text, summary: null };
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  renderStats();

})();
</script>
