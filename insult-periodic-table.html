    --cat-lifestyle: #f59e0b;
    --cat-personality: #a78bfa;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--chalk);

    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;

  /* Chalkboard texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:

    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.035;

    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    letter-spacing: 0.08em;
    color: var(--chalk);
    text-shadow: 0 0 40px rgba(232,224,204,0.2);
    line-height: 1;
  }

  .subtitle {

    font-size: 0.85rem;
    color: var(--chalk-dim);
    margin-top: 6px;
    letter-spacing: 0.15em;
  }

    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    opacity: 0.8;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* Periodic table grid */
  .table-wrapper {
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .periodic-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(58px, 1fr));
    gap: 4px;
    min-width: 900px;
  }

  .element {
    aspect-ratio: 1;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 5px 4px 4px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    user-select: none;
    background: rgba(20,20,20,0.8);
  }

  .element:hover {
    transform: scale(1.08) translateY(-2px);
    z-index: 10;
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }

  .element.selected {
    border-width: 2px;
    transform: scale(1.05);
    z-index: 5;
  }

  .element.selected::after {
    content: '✓';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 0.55rem;
    opacity: 0.9;
  }

  .el-number {
    font-size: 0.5rem;
    opacity: 0.5;
    line-height: 1;
  }

  .el-symbol {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    line-height: 1;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .el-name {
    font-size: 0.38rem;
    text-align: center;
    opacity: 0.75;
    line-height: 1.2;
    letter-spacing: 0.04em;
    word-break: break-word;
  }

  .el-weight {
    font-size: 0.38rem;
    text-align: center;
    opacity: 0.4;
  }

  .spacer { /* invisible grid spacer */
    opacity: 0;
    pointer-events: none;
  }

  .lab-bench {
    margin-top: 28px;
    background: rgba(232,224,204,0.04);
    border: 1px solid rgba(232,224,204,0.12);
    border-radius: 4px;
    padding: 20px;
  }

  .bench-title {
    font-family: 'Special Elite', cursive;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--chalk-dim);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .selected-elements {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 52px;
    margin-bottom: 16px;
    align-items: center;
  }

  .selected-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 3px;
    font-size: 0.7rem;
    border: 1px solid currentColor;
    animation: pillIn 0.2s ease;
  }

  @keyframes pillIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .selected-pill button {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    opacity: 0.6;
    font-size: 0.8rem;
    line-height: 1;
    padding: 0;
  }

  .selected-pill button:hover { opacity: 1; }

  .empty-hint {
    color: var(--chalk-dim);
    font-size: 0.7rem;
    font-family: 'Special Elite', cursive;
    opacity: 0.5;
    font-style: italic;

  .bench-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;

    letter-spacing: 0.1em;
    padding: 9px 18px;
    border-radius: 3px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s ease;

    background: transparent;
    color: var(--chalk);
  }

    cursor: not-allowed;

    background: transparent;
    color: var(--chalk-dim);

  }

  .btn-clear:hover {
    border-color: var(--red);

  @keyframes pulse {

    font-size: 0.65rem;
    color: var(--chalk-dim);
    display: flex;
    gap: 16px;

    font-size: 0.6rem;
    letter-spacing: 0.08em;

    margin-top: 14px;
    display: flex;
    gap: 8px;

      <div class="legend-item">
        <div class="legend-dot" style="background:${cat.color}"></div>
        <span style="color:${cat.color}">${cat.label}</span>
      </div>`;
  });
}

function buildTable() {
  const grid = document.getElementById('periodicGrid');
  ELEMENTS.forEach((el, i) => {
    if (!el) {
      grid.innerHTML += `<div class="element spacer"></div>`;
      return;
    }
    const cat = CATEGORIES[el.cat];
    const div = document.createElement('div');
    div.className = 'element';
    div.dataset.index = i;
    div.style.borderColor = `${cat.color}40`;
    div.style.setProperty('--el-color', cat.color);
    div.innerHTML = `
      <span class="el-number">${el.n}</span>
      <span class="el-symbol" style="color:${cat.color}">${el.sym}</span>
      <span class="el-name">${el.name}</span>
      <span class="el-weight">${el.w}</span>`;
    div.addEventListener('click', () => toggleElement(el, div, cat));
    div.addEventListener('mouseenter', (e) => showTooltip(e, el, cat));
    div.addEventListener('mouseleave', hideTooltip);
    div.addEventListener('mousemove', (e) => moveTooltip(e));
    grid.appendChild(div);
  });
}

function toggleElement(el, div, cat) {
  const idx = selected.findIndex(s => s.el.name === el.name);
  if (idx >= 0) {
    selected.splice(idx, 1);
    div.classList.remove('selected');
    div.style.borderColor = `${cat.color}40`;
    div.style.boxShadow = '';
  } else {
    if (selected.length >= 4) {
      div.style.animation = 'none';
      setTimeout(() => div.style.animation = '', 10);
      return;
    }
    selected.push({ el, cat });
    div.classList.add('selected');
    div.style.borderColor = cat.color;
    div.style.boxShadow = `0 0 12px ${cat.color}60`;
  }
  renderSelected();
}

function renderSelected() {
  const container = document.getElementById('selectedElements');
  const btn = document.getElementById('synthesizeBtn');
  if (selected.length === 0) {
    container.innerHTML = '<span class="empty-hint">Click elements above to add them here...</span>';
    btn.disabled = true;
    return;
  }
  btn.disabled = selected.length < 2;
  container.innerHTML = selected.map((s, i) => `
    <div class="selected-pill" style="color:${s.cat.color};border-color:${s.cat.color}60">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1rem">${s.el.sym}</span>
      <span>${s.el.name}</span>
      <button onclick="removePill(${i})">×</button>
    </div>`).join('');
}

function removePill(i) {
  const removed = selected[i];
  selected.splice(i, 1);
  document.querySelectorAll('.element:not(.spacer)').forEach(div => {
    if (!div.dataset.index) return;
    const el = ELEMENTS[parseInt(div.dataset.index)];
    if (el && el.name === removed.el.name) {
      div.classList.remove('selected');
      div.style.borderColor = `${removed.cat.color}40`;
      div.style.boxShadow = '';
    }
  });
  renderSelected();
}

function clearAll() {
  selected.length = 0;
  document.querySelectorAll('.element.selected').forEach(div => {
    const idx = parseInt(div.dataset.index);
    const el = ELEMENTS[idx];
    if (el) {
      const cat = CATEGORIES[el.cat];
      div.style.borderColor = `${cat.color}40`;
      div.style.boxShadow = '';
    }
    div.classList.remove('selected');
  });
  renderSelected();
  document.getElementById('resultPanel').classList.remove('visible');
}

async function synthesise() {
  if (selected.length < 2) return;
  const panel = document.getElementById('resultPanel');
  const insultEl = document.getElementById('resultInsult');
  const formulaEl = document.getElementById('resultFormula');
  const ratingEl = document.getElementById('resultRating');

  panel.classList.add('visible');
  insultEl.className = 'result-insult loading';
  insultEl.textContent = 'Synthesising compound insult...';
  ratingEl.innerHTML = '';

  const formula = selected.map(s => s.el.sym).join(' + ');
  const names = selected.map(s => s.el.name).join(', ');
  formulaEl.textContent = `COMPOUND FORMULA: ${formula} — ${names}`;

  const prompt = `You are a razor-sharp comedy writer for "Heckler & Cox," a British comedy app.
Generate ONE single devastating, witty insult that combines these personality/appearance elements: ${names}.
The insult should:
- Be a single sentence or two at most
- Blend all the elements naturally and cleverly
- Be cutting and funny, not just mean
- Have the energy of a great roast joke
- Be original and specific, not generic

Also rate the insult on:
- SAVAGERY (1-10)
- WIT (1-10)
- SPECIFICITY (1-10)

Respond ONLY in this exact JSON format, nothing else:
{"insult":"your insult here","savagery":7,"wit":8,"specificity":9}`;

  try {
    const res = await fetch('https://cusslab-api.leanspirited.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    lastInsult = parsed.insult;
    insultEl.className = 'result-insult';
    insultEl.textContent = `"${parsed.insult}"`;

    const savageColor = parsed.savagery >= 8 ? '#ef4444' : parsed.savagery >= 5 ? '#f59e0b' : '#4ade80';
    const witColor    = parsed.wit      >= 8 ? '#a78bfa' : parsed.wit      >= 5 ? '#38bdf8' : '#4ade80';
    ratingEl.innerHTML = `
      <span class="rating-badge" style="color:${savageColor};border-color:${savageColor}60">SAVAGERY: ${parsed.savagery}/10</span>
      <span class="rating-badge" style="color:${witColor};border-color:${witColor}60">WIT: ${parsed.wit}/10</span>
      <span class="rating-badge" style="color:#2dd4bf;border-color:#2dd4bf60">SPECIFICITY: ${parsed.specificity}/10</span>`;
  } catch (e) {
    insultEl.className = 'result-insult';
    insultEl.textContent = '"The synthesis failed — much like your career choices."';
    ratingEl.innerHTML = '<span style="color:#ef4444;font-size:0.6rem">[ REACTION ERROR — TRY AGAIN ]</span>';
  }
}

function showTooltip(e, el, cat) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `<strong style="color:${cat.color}">${el.name}</strong><br>${el.tip}`;
  tip.style.display = 'block';
  moveTooltip(e);
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}

document.getElementById('synthesizeBtn').addEventListener('click', synthesise);
document.getElementById('clearBtn').addEventListener('click', clearAll);
document.getElementById('againBtn').addEventListener('click', synthesise);
document.getElementById('copyBtn').addEventListener('click', () => {
  if (lastInsult) {
    navigator.clipboard.writeText(lastInsult).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '⎘ Copy', 1500);
    });
  }
});

buildLegend();
buildTable();
</script>
</body>
</html>
