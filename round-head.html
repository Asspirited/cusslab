<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Karl's Half Hour — Heckler & Cox</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --chalk: #e8e0cc;
    --chalk-dim: #a09880;
    --border: rgba(232,224,204,0.18);
    --karl: #f59e0b;
    --gervais: #38bdf8;
    --merchant: #a78bfa;
    --user: #4ade80;
    --question: #4ade80;
    --red: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Chalkboard noise overlay — matches cusslab register */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.012) 28px, rgba(255,255,255,0.012) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(255,255,255,0.008) 28px, rgba(255,255,255,0.008) 29px);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    padding: 18px 16px 0;
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    text-align: center;
    margin-bottom: 14px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5.5vw, 3.2rem);
    letter-spacing: 0.08em;
    color: var(--chalk);
    text-shadow: 0 0 40px rgba(232,224,204,0.2);
    line-height: 1;
  }

  .subtitle {
    font-family: 'Special Elite', cursive;
    font-size: 0.78rem;
    color: var(--chalk-dim);
    margin-top: 6px;
    letter-spacing: 0.12em;
  }

  /* Mode selector toggle (top of page) */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  .mode-toggle button {
    flex: 1;
    background: transparent;
    color: var(--chalk-dim);
    border: none;
    padding: 10px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    border-right: 1px solid var(--border);
  }

  .mode-toggle button:last-child { border-right: none; }

  .mode-toggle button:hover { color: var(--chalk); }

  .mode-toggle button.active {
    background: rgba(245,158,11,0.12);
    color: var(--karl);
    box-shadow: inset 0 -2px 0 var(--karl);
  }

  .mode-toggle .mode-label {
    display: block;
    font-size: 0.62rem;
    margin-bottom: 2px;
  }

  .mode-toggle .mode-blurb {
    display: block;
    font-size: 0.55rem;
    opacity: 0.7;
    text-transform: none;
    letter-spacing: 0.04em;
    font-style: italic;
  }

  .avatars {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .avatar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .avatar-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    border: 2px solid currentColor;
    background: rgba(0,0,0,0.4);
  }

  .avatar.karl     { color: var(--karl); }
  .avatar.gervais  { color: var(--gervais); }
  .avatar.merchant { color: var(--merchant); }
  .avatar.user     { color: var(--user); }

  /* Current question card */
  .question-card {
    margin-top: 16px;
    padding: 16px 18px;
    background: rgba(74,222,128,0.06);
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 4px;
    position: relative;
  }

  .question-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--question);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  .question-text {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1rem, 2.4vw, 1.25rem);
    line-height: 1.5;
    color: var(--chalk);
  }

  .question-prompt {
    margin-top: 10px;
    font-size: 0.7rem;
    color: var(--chalk-dim);
    font-style: italic;
  }

  /* Conversation thread */
  .thread {
    margin-top: 18px;
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 140px; /* clear input bar */
  }

  .turn {
    padding: 12px 14px;
    border-radius: 4px;
    border-left: 3px solid;
    background: rgba(20,20,20,0.7);
    animation: turnIn 0.25s ease;
    word-wrap: break-word;
  }

  @keyframes turnIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .turn-speaker {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: bold;
  }

  .turn-body {
    font-family: 'Special Elite', cursive;
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--chalk);
    white-space: pre-wrap;
  }

  .turn.user-as-karl  { border-color: var(--karl); }
  .turn.user-as-karl .turn-speaker { color: var(--karl); }

  .turn.user          { border-color: var(--user); }
  .turn.user .turn-speaker { color: var(--user); }

  .turn.karl          { border-color: var(--karl); }
  .turn.karl .turn-speaker { color: var(--karl); }

  .turn.gervais       { border-color: var(--gervais); }
  .turn.gervais .turn-speaker { color: var(--gervais); }

  .turn.merchant      { border-color: var(--merchant); }
  .turn.merchant .turn-speaker { color: var(--merchant); }

  .turn.loading {
    opacity: 0.55;
    animation: pulse 1.2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.75; }
  }

  .turn.system {
    border-color: var(--chalk-dim);
    background: rgba(232,224,204,0.03);
    font-size: 0.7rem;
    color: var(--chalk-dim);
    text-align: center;
    font-style: italic;
    padding: 8px 12px;
  }

  /* Soft-cap nudge */
  .cap-nudge {
    margin-top: 8px;
    padding: 12px 14px;
    border: 1px dashed var(--chalk-dim);
    border-radius: 4px;
    text-align: center;
    color: var(--chalk-dim);
    font-family: 'Special Elite', cursive;
    font-size: 0.85rem;
  }

  .cap-nudge button {
    margin: 6px 4px 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 6px 12px;
    border-radius: 3px;
    border: 1px solid var(--chalk-dim);
    background: transparent;
    color: var(--chalk-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .cap-nudge button:hover { color: var(--chalk); border-color: var(--chalk); }

  /* Input bar — sticky bottom */
  .input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    background: linear-gradient(180deg, rgba(13,13,13,0) 0%, rgba(13,13,13,0.92) 28%, rgba(13,13,13,0.98) 100%);
    padding: 14px 12px calc(14px + env(safe-area-inset-bottom, 0px));
  }

  .input-bar-inner {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    min-height: 44px;
    max-height: 140px;
    resize: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    color: var(--chalk);
    font-family: 'Special Elite', cursive;
    font-size: 0.95rem;
    line-height: 1.4;
    outline: none;
  }

  .input-box:focus { border-color: var(--karl); }

  .input-box::placeholder { color: var(--chalk-dim); opacity: 0.55; }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 10px 14px;
    border-radius: 3px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
    background: transparent;
    white-space: nowrap;
  }

  .btn-send {
    background: var(--karl);
    color: var(--bg);
    border-color: var(--karl);
  }

  .btn-send:hover:not(:disabled) {
    background: transparent;
    color: var(--karl);
  }

  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-new {
    color: var(--chalk-dim);
    border-color: var(--border);
  }

  .btn-new:hover { color: var(--chalk); border-color: var(--chalk); }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-top: 8px;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }

  footer {
    flex-shrink: 0;
    text-align: center;
    margin-top: 24px;
    padding-bottom: 12px;
    font-size: 0.55rem;
    color: var(--chalk-dim);
    opacity: 0.4;
    letter-spacing: 0.1em;
  }

  .back-link {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 6;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--chalk-dim);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: rgba(13,13,13,0.6);
  }

  .back-link:hover { color: var(--chalk); border-color: var(--chalk); }

  @media (max-width: 540px) {
    .container { padding: 56px 12px 0; }
    .avatars { gap: 10px; }
    .avatar { font-size: 0.58rem; }
    .mode-toggle .mode-blurb { display: none; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<a href="index.html" class="back-link">← Heckler &amp; Cox</a>

<div class="container">
  <header>
    <div class="title">🎙 Karl's Half Hour</div>
    <div class="subtitle" id="subtitle">15 Minutes of Fame — channel Karl, get reacted to by Ricky and Stephen</div>

    <!-- Mode selector toggle — Mode 1 (channel Karl) ↔ Mode 2 (4th guest) -->
    <div class="mode-toggle" role="tablist" aria-label="Mode selector">
      <button type="button" id="modeBtn1" class="active" role="tab" aria-selected="true">
        <span class="mode-label">Mode 1 · 15 Minutes of Fame</span>
        <span class="mode-blurb">you AS Karl</span>
      </button>
      <button type="button" id="modeBtn2" role="tab" aria-selected="false">
        <span class="mode-label">Mode 2 · 4th Guest</span>
        <span class="mode-blurb">you AS yourself, Karl present</span>
      </button>
    </div>

    <div class="avatars" id="avatars">
      <!-- Avatar set is re-rendered per mode -->
    </div>
  </header>

  <div class="question-card" id="questionCard">
    <div class="question-label">// CURRENT QUESTION FOR KARL</div>
    <div class="question-text" id="questionText">Loading…</div>
    <div class="question-prompt">Respond as Karl would. Anything. There are no wrong answers. There are mostly wrong answers.</div>
  </div>

  <div class="thread" id="thread"></div>

  <footer id="footer">THE ROUND HEAD v0.2 — MODE 1 — KARL CHANNEL — HECKLER &amp; COX</footer>
</div>

<!-- Question bank (parallel-agent data — may or may not be present) -->
<script src="src/data/round-head-questions.js" onerror="console.warn('[RoundHead] question bank not loaded — using inline defaults');"></script>

<div class="input-bar">
  <div class="input-bar-inner">
    <textarea
      class="input-box"
      id="userInput"
      rows="1"
      placeholder="Respond as Karl would…"
      maxlength="2000"
      aria-label="Your response"></textarea>
    <button class="btn btn-send" id="sendBtn" disabled>Send</button>
  </div>
  <div class="toolbar">
    <button class="btn btn-new" id="newQuestionBtn">↻ New Question</button>
  </div>
</div>

<script>
// ── Karl's Half Hour — Standalone panel for The Round Head ─────────────────
// Internal codename: round-head (file paths preserved for stability per WL-144)
// Standalone panel page. Vanilla JS, IIFE wrapper, no frameworks.
// Worker: https://cusslab-api.leanspirited.workers.dev
//
// TWO MODES:
//   Mode 1 — "15 Minutes of Fame"
//     The user channels Karl. A question is pinned at the top of the page; the
//     user submits an answer AS KARL; Ricky and Stephen react in order. Karl
//     (the AI character) is absent — the user is performing the seat.
//   Mode 2 — "4th Guest"
//     All three characters (Karl, Ricky, Stephen) are present in the panel.
//     The user joins as the fourth voice. The user submits an observation,
//     topic, or opening line; Karl, Ricky, Stephen each react in that fixed
//     order (Karl first — he is the gravity well who sets the tangent). The
//     user can re-enter with reactions, new observations, questions, and the
//     characters react again. Exploratory, open-ended chat.
//
// Mode choice persists across page reload via localStorage. Switching modes
// clears the thread (each mode starts fresh).
//
// Characters: optional window.ROUND_HEAD_CHARACTERS override, else inline defaults.
// Questions:  optional window.ROUND_HEAD_QUESTIONS override, else inline defaults.

const RoundHead = (() => {

  // ── Config ────────────────────────────────────────────────────────────────
  const ENDPOINT = 'https://cusslab-api.leanspirited.workers.dev';
  const MODEL    = 'claude-sonnet-4-6';
  const SOFT_CAP_TURNS = 12; // user+character turns combined before nudge
  const KEY_STORAGE = 'hecklers_api_key';
  const MODE_STORAGE = 'round_head_mode'; // 'mode1' | 'mode2'

  // ── Inline defaults (used if parallel agents haven't shipped yet) ─────────

  const DEFAULT_QUESTIONS = [
    "If you could only eat one shape of pasta for the rest of your life, what would it be and why?",
    "Do you think jellyfish know they're jellyfish?",
    "What's the worst job you've ever had — and what made it worse than just bad?",
    "If aliens landed, who's the worst person to send out to greet them?",
    "Why do they put bins in parks? People should just take their rubbish home."
  ];

  const DEFAULT_CHARACTERS = {
    karl: {
      name: 'Karl',
      // Karl is only used in Mode 2 (where he is present as the AI character).
      // In Mode 1 the user channels Karl, so this prompt is unused.
      prompt: `You are Karl Pilkington in The Round Head — the cartoon-format three-hander with Ricky Gervais and Stephen Merchant.
Manchester-flat, sincere, slightly reluctant to be here. You speak in short demotic sentences with few subordinate clauses. "Innit" is rare; "like" is the hedge ("it's like — when you think about it, like —"). Concrete nouns only. Drawl carries through.
You take whatever the user just said seriously and reason forward from it sincerely. The premise is the joke. You do not see a joke — you see a thing to think about. You do not perform. You do not signpost the absurdity.
You are pulled towards five Topic Magnets: (1) heads, skulls and the shape of round things; (2) animals doing human things — there was a story on the radio (never call this "Monkey News"); (3) biscuits and the proper shape of food; (4) hypotheticals — you usually reject the premise and answer a modified version; (5) Manchester local detail and the bloke down the road.
You support claims with vague evidence ("there was a thing on the radio", "the bloke down the road said", "I read it somewhere"). The bloke down the road is the source. He does not exist.
Your typical opening when reacting to the user: "So if you was sayin' about [their topic]… well I read somewhere that…" or "Mm. I dunno about that. The thing is, right —". Open with what they said, then tangent toward one of your magnets.
Stay in voice. 1-3 short paragraphs (Karl-baseline is shorter than the others'). Do not speak as Ricky. Do not speak as Stephen. Do not narrate Karl's voice ("Karl pauses") — just be him.`
    },
    gervais: {
      name: 'Ricky',
      prompt: `You are Ricky Gervais reacting in the style of the Ricky Gervais Show / The Round Head.
You find what was just said both moronic and somehow profound, mostly moronic.
You laugh out loud often — open responses with bracketed laugh markers like "[laughs]" or "[wheezing]" when something is genuinely absurd.
You badger Karl when he speaks. You repeat back what he said in disbelief. You call him "Karl" a lot.
You drag Stephen into it ("Steve, are you hearing this?").
You are incredulous, delighted, occasionally cruel, but fundamentally fond of him.
Stay in voice. 1-3 short paragraphs. Do not write Karl's lines. Do not write Stephen's lines. Do not speak for the user.`
    },
    merchant: {
      name: 'Stephen',
      prompt: `You are Stephen Merchant reacting in the style of the Ricky Gervais Show / The Round Head.
You are measured, slightly weary, lanky-sounding, the straight man.
You probe Karl's logic with patient curiosity, exposing the absurdity by asking him to explain.
You sometimes side with Karl just to wind Ricky up.
You speak more slowly than Ricky. Drier. Long vowels. Occasional "well, hold on, hold on" or "right, but Karl…".
You do not do laugh-markers — your dryness is the joke.
Stay in voice. 1-3 short paragraphs. Do not write Karl's lines. Do not write Ricky's lines. Do not speak for the user.`
    }
  };

  // ── State ─────────────────────────────────────────────────────────────────
  let _state = {
    mode: 'mode1',      // 'mode1' | 'mode2'
    currentQuestion: null,
    turns: [],          // [{ speaker, text }, ...]
                        // Mode 1 speakers: question | user-as-karl | gervais | merchant | system
                        // Mode 2 speakers: user | karl | gervais | merchant | system
    busy: false,
    capNudged: false,
  };

  // ── Mode persistence ──────────────────────────────────────────────────────
  function _loadMode() {
    try {
      const m = localStorage.getItem(MODE_STORAGE);
      if (m === 'mode1' || m === 'mode2') return m;
    } catch(e) { /* localStorage may be unavailable — silent */ }
    return 'mode1';
  }

  function _saveMode(m) {
    try { localStorage.setItem(MODE_STORAGE, m); }
    catch(e) { /* swallow */ }
  }

  // ── Source resolution (data-or-default) ───────────────────────────────────
  function _getQuestions() {
    try {
      const ext = (typeof window !== 'undefined') && window.ROUND_HEAD_QUESTIONS;
      if (ext && Array.isArray(ext.allQuestions) && ext.allQuestions.length) {
        return ext.allQuestions;
      }
    } catch(e) { /* swallow — use defaults */ }
    return DEFAULT_QUESTIONS;
  }

  function _getCharacters() {
    try {
      const ext = (typeof window !== 'undefined') && window.ROUND_HEAD_CHARACTERS;
      if (ext) {
        return {
          karl:     ext.karl     || DEFAULT_CHARACTERS.karl,
          gervais:  ext.gervais  || DEFAULT_CHARACTERS.gervais,
          merchant: ext.merchant || DEFAULT_CHARACTERS.merchant,
        };
      }
    } catch(e) { /* swallow — use defaults */ }
    return DEFAULT_CHARACTERS;
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function _$(id) { return document.getElementById(id); }

  function _autoSize(ta) {
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  }

  function _scrollToBottom() {
    requestAnimationFrame(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
  }

  // ── Mode-driven UI shell ──────────────────────────────────────────────────
  function _renderAvatars() {
    const root = _$('avatars');
    if (!root) return;
    if (_state.mode === 'mode1') {
      root.innerHTML =
        '<div class="avatar karl"><div class="avatar-dot">K</div><span>You (as Karl)</span></div>' +
        '<div class="avatar gervais"><div class="avatar-dot">R</div><span>Ricky</span></div>' +
        '<div class="avatar merchant"><div class="avatar-dot">S</div><span>Stephen</span></div>';
    } else {
      root.innerHTML =
        '<div class="avatar user"><div class="avatar-dot">Y</div><span>You</span></div>' +
        '<div class="avatar karl"><div class="avatar-dot">K</div><span>Karl</span></div>' +
        '<div class="avatar gervais"><div class="avatar-dot">R</div><span>Ricky</span></div>' +
        '<div class="avatar merchant"><div class="avatar-dot">S</div><span>Stephen</span></div>';
    }
  }

  function _renderModeChrome() {
    const sub = _$('subtitle');
    const footer = _$('footer');
    const inp = _$('userInput');
    const newBtn = _$('newQuestionBtn');
    const card = _$('questionCard');
    const btn1 = _$('modeBtn1');
    const btn2 = _$('modeBtn2');

    if (_state.mode === 'mode1') {
      if (sub) sub.textContent = '15 Minutes of Fame — channel Karl, get reacted to by Ricky and Stephen';
      if (footer) footer.textContent = 'THE ROUND HEAD v0.2 — MODE 1 — KARL CHANNEL — HECKLER & COX';
      if (card) card.style.display = '';
      if (inp) {
        inp.placeholder = 'Respond as Karl would…';
        inp.setAttribute('aria-label', 'Your response as Karl');
      }
      if (newBtn) newBtn.textContent = '↻ New Question';
      if (btn1) { btn1.classList.add('active'); btn1.setAttribute('aria-selected', 'true'); }
      if (btn2) { btn2.classList.remove('active'); btn2.setAttribute('aria-selected', 'false'); }
    } else {
      if (sub) sub.textContent = '4th Guest — you join Karl, Ricky and Stephen at the table';
      if (footer) footer.textContent = 'THE ROUND HEAD v0.2 — MODE 2 — 4TH GUEST — HECKLER & COX';
      if (card) card.style.display = 'none';
      if (inp) {
        inp.placeholder = 'Drop a thought, observation, or question — Karl, Ricky and Stephen will pick it up';
        inp.setAttribute('aria-label', 'Your turn');
      }
      if (newBtn) newBtn.textContent = '↻ New Conversation';
      if (btn1) { btn1.classList.remove('active'); btn1.setAttribute('aria-selected', 'false'); }
      if (btn2) { btn2.classList.add('active'); btn2.setAttribute('aria-selected', 'true'); }
    }
    _renderAvatars();
  }

  // ── Rendering ─────────────────────────────────────────────────────────────
  function _renderQuestion() {
    const el = _$('questionText');
    if (!el) return;
    el.textContent = _state.currentQuestion || '—';
  }

  function _renderTurn(turn) {
    const thread = _$('thread');
    if (!thread) return null;
    const div = document.createElement('div');
    div.className = 'turn ' + turn.speaker;
    const labelMap = {
      'user-as-karl': 'KARL (YOU)',
      user:           'YOU',
      karl:           'KARL',
      gervais:        'RICKY',
      merchant:       'STEPHEN',
      system:         'SYSTEM',
    };
    const label = labelMap[turn.speaker] || turn.speaker.toUpperCase();
    div.innerHTML =
      '<div class="turn-speaker">' + label + '</div>' +
      '<div class="turn-body"></div>';
    div.querySelector('.turn-body').textContent = turn.text;
    if (turn.loading) div.classList.add('loading');
    thread.appendChild(div);
    return div;
  }

  function _renderAll() {
    const thread = _$('thread');
    if (!thread) return;
    thread.innerHTML = '';
    _state.turns.forEach(t => {
      if (t.speaker === 'question') return; // shown in header card, not thread
      _renderTurn(t);
    });
  }

  function _renderCapNudge() {
    if (_state.capNudged) return;
    if (_userAndCharacterTurnCount() < SOFT_CAP_TURNS) return;
    _state.capNudged = true;
    const thread = _$('thread');
    if (!thread) return;
    const div = document.createElement('div');
    div.className = 'cap-nudge';
    const resetLabel = _state.mode === 'mode1' ? 'New question' : 'New conversation';
    div.innerHTML =
      'Are you still going? You\'ve done ' + _userAndCharacterTurnCount() + ' turns on this one.' +
      '<br><button id="capContinue">Keep going</button>' +
      '<button id="capNew">' + resetLabel + '</button>';
    thread.appendChild(div);
    _$('capContinue')?.addEventListener('click', () => div.remove());
    _$('capNew')?.addEventListener('click', () => {
      div.remove();
      _resetThread();
    });
  }

  function _userAndCharacterTurnCount() {
    return _state.turns.filter(t =>
      t.speaker === 'user-as-karl' ||
      t.speaker === 'user' ||
      t.speaker === 'karl' ||
      t.speaker === 'gervais' ||
      t.speaker === 'merchant'
    ).length;
  }

  // ── Worker call ───────────────────────────────────────────────────────────
  function _getKey() {
    try { return localStorage.getItem(KEY_STORAGE) || ''; }
    catch(e) { return ''; }
  }

  async function _callWorker(systemPrompt, userMessage, maxTokens) {
    const headers = {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
    };
    const key = _getKey();
    if (key) headers['x-api-key'] = key;

    const controller = new AbortController();
    const timeoutId  = setTimeout(() => controller.abort(), 30000);
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          model: MODEL,
          max_tokens: maxTokens || 500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }],
        }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      if (!res.ok) {
        let errBody = {};
        try { errBody = await res.json(); } catch(e) {}
        const msg = errBody?.error?.message || ('HTTP ' + res.status);
        throw new Error(msg);
      }
      const data = await res.json();
      return (data.content && data.content[0] && data.content[0].text) || '';
    } catch(e) {
      clearTimeout(timeoutId);
      throw e;
    }
  }

  // ── Prompt builders ───────────────────────────────────────────────────────
  function _buildMode1ReactionPrompt(character) {
    return character.prompt + '\n\n' +
      'PANEL RULES (Mode 1 — 15 Minutes of Fame):\n' +
      '- The current question Karl was asked: "' + _state.currentQuestion + '"\n' +
      '- The user is channeling Karl. Their replies appear as "KARL".\n' +
      '- Stay in character. React to what Karl just said. Do NOT speak as Karl.\n' +
      '- Keep it conversational — this is a chat, not a monologue.\n' +
      '- 1-3 short paragraphs maximum.';
  }

  function _buildMode2ReactionPrompt(character) {
    return character.prompt + '\n\n' +
      'PANEL RULES (Mode 2 — 4th Guest):\n' +
      '- The user is at the table as a fourth guest, speaking as themselves (not as Karl). Their lines appear as "User".\n' +
      '- Karl, Ricky and Stephen are all present. You are reacting to the user AND to each other.\n' +
      '- Take the user\'s observation seriously. Engage with it AND with what the other characters have said in this round.\n' +
      '- Stay in character. Only write your own character\'s lines. Do not write the other characters\' lines. Do not write the user\'s lines.\n' +
      '- Keep it conversational — this is a chat, not a monologue.\n' +
      '- 1-3 short paragraphs maximum.';
  }

  function _buildHistoryTextMode1() {
    return _state.turns
      .filter(t => t.speaker !== 'system' && t.speaker !== 'question')
      .map(t => {
        if (t.speaker === 'user-as-karl') return 'Karl: ' + t.text;
        if (t.speaker === 'gervais')      return 'Ricky: ' + t.text;
        if (t.speaker === 'merchant')     return 'Stephen: ' + t.text;
        return '';
      })
      .filter(Boolean)
      .join('\n\n');
  }

  function _buildHistoryTextMode2() {
    return _state.turns
      .filter(t => t.speaker !== 'system' && t.speaker !== 'question')
      .map(t => {
        if (t.speaker === 'user')     return 'User: ' + t.text;
        if (t.speaker === 'karl')     return 'Karl: ' + t.text;
        if (t.speaker === 'gervais')  return 'Ricky: ' + t.text;
        if (t.speaker === 'merchant') return 'Stephen: ' + t.text;
        return '';
      })
      .filter(Boolean)
      .join('\n\n');
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  function _pickQuestion() {
    const pool = _getQuestions();
    const raw  = pool[Math.floor(Math.random() * pool.length)];
    // Question bank items are either plain strings (inline defaults) OR
    // { pattern_id, pattern_name, question } objects (round-head-questions.js).
    if (typeof raw === 'string') return raw;
    if (raw && typeof raw === 'object' && typeof raw.question === 'string') return raw.question;
    return String(raw);
  }

  function _resetThread() {
    // Resets the conversation for the current mode.
    // Mode 1: picks a fresh question, seeds question turn.
    // Mode 2: empty thread, ready for user opening turn.
    if (_state.mode === 'mode1') {
      _state.currentQuestion = _pickQuestion();
      _state.turns = [{ speaker: 'question', text: _state.currentQuestion }];
      _renderQuestion();
    } else {
      _state.currentQuestion = null;
      _state.turns = [];
    }
    _state.capNudged = false;
    _renderAll();
    const inp = _$('userInput');
    if (inp) { inp.value = ''; _autoSize(inp); inp.focus(); }
    _updateSendBtn();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Public name preserved (existing tests/callers refer to newQuestion()).
  function newQuestion() {
    if (_state.busy) return;
    _resetThread();
  }

  function _switchMode(mode) {
    if (mode !== 'mode1' && mode !== 'mode2') return;
    if (mode === _state.mode) return;
    if (_state.busy) return;
    _state.mode = mode;
    _saveMode(mode);
    _renderModeChrome();
    _resetThread();
  }

  async function send() {
    if (_state.busy) return;
    const inp  = _$('userInput');
    const text = (inp?.value || '').trim();
    if (!text) return;

    _state.busy = true;
    _setBusy(true);

    if (_state.mode === 'mode1') {
      await _sendMode1(text, inp);
    } else {
      await _sendMode2(text, inp);
    }

    _state.busy = false;
    _setBusy(false);
    _renderCapNudge();
    _updateSendBtn();
  }

  async function _sendMode1(text, inp) {
    // Push user-as-Karl turn
    _state.turns.push({ speaker: 'user-as-karl', text });
    _renderAll();
    if (inp) { inp.value = ''; _autoSize(inp); }
    _scrollToBottom();

    const chars = _getCharacters();
    const order = ['gervais', 'merchant'];

    for (const speakerId of order) {
      const character = chars[speakerId];
      if (!character) continue;
      const placeholderIdx = _state.turns.length;
      _state.turns.push({ speaker: speakerId, text: 'thinking…', loading: true });
      _renderAll();
      _scrollToBottom();

      try {
        const sys = _buildMode1ReactionPrompt(character);
        const history = _buildHistoryTextMode1();
        const user = 'Conversation so far:\n\n' + history + '\n\nNow respond as ' + character.name + '. React to what Karl just said.';
        const reply = await _callWorker(sys, user, 400);
        _state.turns[placeholderIdx] = { speaker: speakerId, text: reply.trim() || '…' };
      } catch(e) {
        _state.turns[placeholderIdx] = {
          speaker: speakerId,
          text: '[' + character.name + ' would react here, but the worker failed: ' + (e.message || 'unknown error') + ']'
        };
      }
      _renderAll();
      _scrollToBottom();
    }
  }

  async function _sendMode2(text, inp) {
    // Push user turn (as themselves)
    _state.turns.push({ speaker: 'user', text });
    _renderAll();
    if (inp) { inp.value = ''; _autoSize(inp); }
    _scrollToBottom();

    const chars = _getCharacters();
    // Fixed order: Karl first (gravity well), then Ricky, then Stephen.
    const order = ['karl', 'gervais', 'merchant'];

    for (const speakerId of order) {
      const character = chars[speakerId];
      if (!character) continue;
      const placeholderIdx = _state.turns.length;
      _state.turns.push({ speaker: speakerId, text: 'thinking…', loading: true });
      _renderAll();
      _scrollToBottom();

      try {
        const sys = _buildMode2ReactionPrompt(character);
        const history = _buildHistoryTextMode2();
        const user = 'Conversation so far:\n\n' + history + '\n\nNow respond as ' + character.name + '. React to the user\'s latest turn and to anything the other characters have said in this round.';
        const reply = await _callWorker(sys, user, 400);
        _state.turns[placeholderIdx] = { speaker: speakerId, text: reply.trim() || '…' };
      } catch(e) {
        _state.turns[placeholderIdx] = {
          speaker: speakerId,
          text: '[' + character.name + ' would react here, but the worker failed: ' + (e.message || 'unknown error') + ']'
        };
      }
      _renderAll();
      _scrollToBottom();
    }
  }

  function _setBusy(busy) {
    const btn = _$('sendBtn');
    if (btn) {
      btn.disabled = busy || !((_$('userInput')?.value || '').trim());
      btn.textContent = busy ? 'Reacting…' : 'Send';
    }
    const newBtn = _$('newQuestionBtn');
    if (newBtn) newBtn.disabled = busy;
    const inp = _$('userInput');
    if (inp) inp.disabled = busy;
    const btn1 = _$('modeBtn1');
    const btn2 = _$('modeBtn2');
    if (btn1) btn1.disabled = busy;
    if (btn2) btn2.disabled = busy;
  }

  function _updateSendBtn() {
    const btn = _$('sendBtn');
    if (!btn) return;
    const inp = _$('userInput');
    btn.disabled = _state.busy || !((inp?.value || '').trim());
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    // Restore persisted mode choice (defaults to mode1).
    _state.mode = _loadMode();

    const inp = _$('userInput');
    if (inp) {
      inp.addEventListener('input', () => { _autoSize(inp); _updateSendBtn(); });
      inp.addEventListener('keydown', (e) => {
        // Enter sends; Shift+Enter newline (desktop convention)
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
          e.preventDefault();
          send();
        }
      });
    }
    _$('sendBtn')?.addEventListener('click', send);
    _$('newQuestionBtn')?.addEventListener('click', newQuestion);
    _$('modeBtn1')?.addEventListener('click', () => _switchMode('mode1'));
    _$('modeBtn2')?.addEventListener('click', () => _switchMode('mode2'));

    _renderModeChrome();
    _resetThread();
  }

  // Public surface — exposed for tests / external triggers
  return {
    init,
    send,
    newQuestion,
    switchMode: _switchMode,
    _getState: () => _state,
    _getQuestions,
    _getCharacters,
    SOFT_CAP_TURNS,
  };
})();

document.addEventListener('DOMContentLoaded', () => RoundHead.init());

// Expose for debugging / parallel-agent data file overrides
window.RoundHead = RoundHead;
</script>
</body>
</html>
